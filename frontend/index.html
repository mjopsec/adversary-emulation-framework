          <div className="flex items-center gap-3">
            <i className={`${OS_ICONS[agent.os_type]||OS_ICONS.unknown} text-xl`} style={{color:OS_COLORS[agent.os_type]||OS_COLORS.unknown}}></i>
            <div>
              <div className="font-semibold text-white">{agent.hostname}</div>
              <div className="text-xs text-slate-300">{agent.ip_address} · {agent.os_type}</div>
            </div>
          </div>
          <button onClick={onClose} className="text-slate-300 hover:text-white w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white/10">
            <i className="fa-solid fa-xmark"></i>
          </button>
        </div>

        {/* Agent info */}
        <div className="px-5 py-3 shrink-0" style={{borderBottom:"1px solid #E2E8F0", background:"#F8FAFC"}}>
          <div className="grid grid-cols-3 gap-3 text-xs">
            {[["Status", <span style={{color:AGENT_STATUS_COLOR[agent.status]||"#94a3b8"}} className="font-semibold">{agent.status}</span>],
              ["Type", agent.agent_type?.toUpperCase()],
              ["Privilege", agent.privilege_level||"—"],
              ["Beacon", `${agent.beacon_interval}s`],
              ["Last seen", agent.last_seen?new Date(agent.last_seen).toLocaleTimeString():"Never"],
              ["Tasks done", agent.tasks_completed??0],
            ].map(([l,v])=>(
              <div key={l}><div className="text-slate-500 uppercase tracking-wider mb-0.5">{l}</div><div className="text-slate-800">{v}</div></div>
            ))}
          </div>
          {agent.capabilities?.length > 0 && (
            <div className="mt-2 flex flex-wrap gap-1">
              {agent.capabilities.map(c => <span key={c} className="tag-chip">{c}</span>)}
            </div>
          )}
        </div>

        <Alert msg={err} onClose={() => setErr("")} />
        <Alert type="success" msg={success} onClose={() => setSuccess("")} />

        {/* Task controls */}
        <div className="px-5 py-3 flex items-center justify-between shrink-0" style={{borderBottom:"1px solid #E2E8F0"}}>
          <span className="text-sm font-semibold text-slate-900">Task Queue ({tasks?.length ?? "…"})</span>
          <div className="flex gap-2">
            <button className="btn-sm btn-purple" onClick={() => setShowQueue(!showQueue)}><i className="fa-solid fa-plus"></i>Queue Task</button>
            <button className="btn-sm" style={{background:"#F1F5F9",color:"#64748b",border:"1px solid #CBD5E1"}} onClick={load}><i className="fa-solid fa-rotate-right"></i></button>
            {agent.status !== "terminated" && (
              <button className="btn-sm btn-red" onClick={terminateAgent}><i className="fa-solid fa-skull"></i>Terminate</button>
            )}
          </div>
        </div>

        {/* Queue form */}
        {showQueue && (
          <div className="px-5 py-4 shrink-0" style={{borderBottom:"1px solid #E2E8F0", background:"#F8FAFC"}}>
            <form onSubmit={queueTask} className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <FormField label="Task Type">
                  <select className="input-field" value={qForm.task_type} onChange={e => setQForm(f=>({...f,task_type:e.target.value}))}>
                    {TASK_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </FormField>
                <FormField label="Technique ID" hint="e.g. T1057, T1082">
                  <input className="input-field" value={qForm.technique_id}
                    onChange={e => setQForm(f=>({...f,technique_id:e.target.value.toUpperCase()}))}
                    placeholder="T1057" />
                </FormField>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <FormField label="Priority (1–10)">
                  <input type="number" min={1} max={10} className="input-field" value={qForm.priority}
                    onChange={e => setQForm(f=>({...f,priority:parseInt(e.target.value)||5}))} />
                </FormField>
                <FormField label="Timeout (sec)">
                  <input type="number" min={30} className="input-field" value={qForm.timeout_seconds}
                    onChange={e => setQForm(f=>({...f,timeout_seconds:parseInt(e.target.value)||300}))} />
                </FormField>
              </div>
              <FormField label="Params (JSON)" hint={`shell_command: {"command":"whoami"} | file_read: {"path":"/etc/passwd"} | network_scan: {"target":"10.0.0.1"}`}>
                <textarea className="input-field font-mono text-xs" rows={3} value={rawParams}
                  onChange={e => setRawParams(e.target.value)}
                  placeholder='{"command": "whoami && hostname"}' />
              </FormField>
              <div className="flex gap-2">
                <button type="submit" className="btn-sm btn-emerald"><i className="fa-solid fa-paper-plane"></i>Send Task</button>
                <button type="button" className="btn-ghost btn-sm" onClick={() => setShowQueue(false)}>Cancel</button>
              </div>
            </form>
          </div>
        )}

        {/* Task list */}
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-2">
          {tasks === null ? <Spinner size="sm" /> : tasks.length === 0 ? (
            <div className="text-center text-slate-600 py-8 text-sm">No tasks yet — queue a task above</div>
          ) : tasks.map(t => (
            <div key={t.id} className="rounded-xl p-3 cursor-pointer transition-all"
              style={{background: selectedTask===t.id?"#EFF6FF":"#F8FAFC", border:`1px solid ${selectedTask===t.id?"#93C5FD":"#E2E8F0"}`}}
              onClick={() => setSelectedTask(selectedTask===t.id ? null : t.id)}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full shrink-0" style={{background:statusDot[t.status]||"#64748b"}}></span>
                  <span className="text-xs font-mono font-semibold" style={{color:"#7C3AED"}}>{t.technique_id||"—"}</span>
                  <span className="text-xs text-slate-500">{t.task_type}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className={`badge badge-${t.status==="completed"?"active":t.status==="failed"?"aborted":t.status==="running"?"validating":"draft"}`}>{t.status}</span>
                  {t.duration_seconds && <span className="text-xs text-slate-600">{t.duration_seconds.toFixed(1)}s</span>}
                </div>
              </div>

              {/* Expanded output */}
              {selectedTask === t.id && (
                <div className="mt-3 space-y-2">
                  {t.output && (
                    <div>
                      <div className="text-xs text-slate-500 mb-1">Output:</div>
                      <div className="sigma-block max-h-48 overflow-y-auto">{t.output}</div>
                    </div>
                  )}
                  {t.result_status && <div className="text-xs text-slate-500">Result: <span className={t.result_status==="success"?"text-emerald-400":"text-red-400"}>{t.result_status}</span></div>}
                  {t.completed_at && <div className="text-xs text-slate-600">Completed: {new Date(t.completed_at).toLocaleString()}</div>}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
    </>,
    document.body
  );
}

          <div className="grid grid-cols-3 gap-4">

// ─── Purple Team ──────────────────────────────────────────────────────────────
function PurpleTeam({ navigate }) {
  const [sessions, setSessions] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);
  const [deletingSession, setDeletingSession] = useState(null);
  const [showConfirm, ConfirmNode] = useConfirm();
  const initForm = { name:"", environment:"it", description:"", red_team_lead:"", blue_team_lead:"", facilitator:"" };
  const [form, setForm] = useState(initForm);

  const load = useCallback(() => {
    apiFetch("/purple/sessions").then(setSessions).catch(e => { setErr(e.message); setSessions([]); });
  }, []);
  useEffect(() => { load(); }, [load]);

  function set(k,v) { setForm(f=>({...f,[k]:v})); }

  async function create(e) {
    e.preventDefault(); setErr(""); setSaving(true);
    try {
      await apiFetch("/purple/sessions", { method:"POST", body:JSON.stringify(form) });
      setShowForm(false); setForm(initForm); load();
    } catch(ex) { setErr(ex.message); }
    finally { setSaving(false); }
  }

  async function deleteSession(e, s) {
    e.stopPropagation();
    const ok = await showConfirm({
      title: "Hapus Purple Session",
      message: `Session "${s.name}" beserta semua events dan data deteksinya akan dihapus permanen.`,
      confirmLabel: "Ya, Hapus Session",
      variant: "danger",
      icon: "fa-shield-halved",
    });
    if (!ok) return;
    setDeletingSession(s.id);
    try {
      await apiFetch(`/purple/sessions/${s.id}`, { method:"DELETE" });
      load();
    } catch(ex) { setErr(ex.message); }
    finally { setDeletingSession(null); }
  }

  return (
    <div className="space-y-5">
      {ConfirmNode}
      <div className="flex items-center justify-between">
        <div><h1 className="text-xl font-bold text-slate-900">Purple Team</h1>
          <p className="text-sm text-slate-500 mt-1">Collaborative red + blue team detection validation</p></div>
        <button className="btn-primary" onClick={() => setShowForm(true)}><i className="fa-solid fa-plus mr-2"></i>New Session</button>
      </div>
      <Alert msg={err} onClose={() => setErr("")} />

      {showForm && (
        <Modal title="Create Purple Team Session" onClose={() => setShowForm(false)}>
          <form onSubmit={create} className="space-y-4">
            <Alert msg={err} onClose={() => setErr("")} />
            <FormField label="Session Name" required>
              <input className="input-field" required value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Q2 2025 Detection Validation" />
            </FormField>
            <FormField label="Environment">
              <select className="input-field" value={form.environment} onChange={e=>set("environment",e.target.value)}>
                <option value="it">Enterprise IT</option><option value="ot">OT/ICS</option><option value="hybrid_it_ot">Hybrid IT+OT</option>
              </select>
            </FormField>
            <div className="grid grid-cols-2 gap-3">
              <FormField label="Red Team Lead"><input className="input-field" value={form.red_team_lead} onChange={e=>set("red_team_lead",e.target.value)} placeholder="Operator name" /></FormField>
              <FormField label="Blue Team Lead"><input className="input-field" value={form.blue_team_lead} onChange={e=>set("blue_team_lead",e.target.value)} placeholder="SOC analyst" /></FormField>
            </div>
            <FormField label="Facilitator"><input className="input-field" value={form.facilitator} onChange={e=>set("facilitator",e.target.value)} placeholder="Session facilitator" /></FormField>
            <FormField label="Description"><textarea className="input-field" value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Session objectives…" /></FormField>
            <div className="flex justify-end gap-3 pt-2">
              <button type="button" className="btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
              <button type="submit" className="btn-primary" disabled={saving}>{saving?"Creating…":"Create Session"}</button>
            </div>
          </form>
        </Modal>
      )}

      {sessions === null ? <Spinner /> : sessions.length === 0 ? (
        <div className="card p-16 text-center">
          <i className="fa-solid fa-shield-halved text-5xl text-slate-700 mb-4 block"></i>
          <p className="text-slate-400 font-medium">No sessions yet</p>
          <button className="btn-primary mt-4" onClick={() => setShowForm(true)}>Create First Session</button>
        </div>
      ) : (
        <div className="card overflow-hidden">
          <table className="w-full text-sm">
            <thead><tr style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0"}}>
              {["Session","Env","Status","Events","Gaps","Red Lead","Blue Lead",""].map(h=>(
                <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">{h}</th>
              ))}
            </tr></thead>
            <tbody className="divide-y" style={{borderColor:"#E2E8F0"}}>
              {sessions.map(s=>(
                <tr key={s.id} className="table-row cursor-pointer" onClick={() => navigate("purple-detail",{id:s.id})}>
                  <td className="px-4 py-3"><div className="font-medium text-slate-900">{s.name}</div><div className="text-xs text-slate-400">{s.description||"—"}</div></td>
                  <td className="px-4 py-3"><span className="badge badge-draft">{s.environment?.toUpperCase()}</span></td>
                  <td className="px-4 py-3"><StatusBadge status={s.status} /></td>
                  <td className="px-4 py-3 text-slate-600">{s.event_count??0}</td>
                  <td className="px-4 py-3 font-semibold" style={{color:(s.gap_count||0)>0?"#dc2626":"#16a34a"}}>{s.gap_count??0}</td>
                  <td className="px-4 py-3 text-slate-500 text-xs">{s.red_team_lead||"—"}</td>
                  <td className="px-4 py-3 text-slate-500 text-xs">{s.blue_team_lead||"—"}</td>
                  <td className="px-4 py-3 text-right" style={{whiteSpace:"nowrap"}}>
                    <button
                      onClick={e => deleteSession(e, s)}
                      disabled={deletingSession === s.id || s.status === "active"}
                      title={s.status === "active" ? "Complete session dulu sebelum hapus" : "Hapus session"}
                      className="text-slate-400 hover:text-red-500 transition-colors mr-3 disabled:opacity-30 disabled:cursor-not-allowed"
                    >
                      {deletingSession === s.id
                        ? <i className="fa-solid fa-circle-notch spin text-xs"></i>
                        : <i className="fa-solid fa-trash text-xs"></i>}
                    </button>
                    <i className="fa-solid fa-chevron-right text-slate-400 text-xs"></i>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

  const [responding, setResponding] = useState(null);

  const [showConfirm, ConfirmNode] = useConfirm();

  const BLUE = ["detected","not_detected","partially_detected","escalated","blocked","contained","false_positive"];

  const load = useCallback(() => {
    apiFetch(`/purple/sessions/${id}`).then(setSession).catch(e => setErr(e.message));
    apiFetch(`/purple/sessions/${id}/events`).then(setEvents).catch(() => setEvents([]));
    apiFetch(`/purple/sessions/${id}/gaps`).then(setGaps).catch(() => {});
  }, [id]);
  useEffect(() => { load(); }, [load]);

  async function doStart() {
    try { await apiFetch(`/purple/sessions/${id}/start`, {method:"POST"}); setSuccess("Session started"); load(); }
    catch(ex) { setErr(ex.message); }
  }
  async function doComplete() {
    const ok = await showConfirm({
      title: "Selesaikan Session",
      message: "Session akan ditandai sebagai completed.\nSetelah ini, Anda bisa generate laporan Purple Team.",
      confirmLabel: "Ya, Complete",
      variant: "info",
      icon: "fa-check-circle",
    });
    if (!ok) return;
    try { await apiFetch(`/purple/sessions/${id}/complete`, {method:"POST"}); setSuccess("Session completed"); load(); }
    catch(ex) { setErr(ex.message); }
  }
  async function recordEvent(e) {
    e.preventDefault(); setErr("");
    try {
      await apiFetch(`/purple/sessions/${id}/events`, {method:"POST", body:JSON.stringify(eventForm)});
      setShowEventForm(false); setEventForm({technique_id:"",technique_name:"",tactic:"",target:"",notes:"",execution_method:""}); load();
    } catch(ex) { setErr(ex.message); }
  }
  async function submitResponse(eid, e) {
    e.preventDefault(); setErr("");
    try {
      const body = {...respForm};
      if (body.detection_latency_seconds) body.detection_latency_seconds = parseFloat(body.detection_latency_seconds);
      else delete body.detection_latency_seconds;
      await apiFetch(`/purple/sessions/${id}/events/${eid}/respond`, {method:"POST", body:JSON.stringify(body)});
      setResponding(null); setSuccess("Blue team response recorded"); load();
    } catch(ex) { setErr(ex.message); }
  }

  if (!session) return <Spinner />;

  return (
    <div className="space-y-5">
      {ConfirmNode}
      <div className="flex items-center gap-3">
        <button onClick={() => navigate("purple")} className="btn-ghost"><i className="fa-solid fa-arrow-left mr-1.5"></i>Back</button>
        <span className="text-slate-400">/</span>
        <span className="text-slate-900 font-semibold">{session.name}</span>
        <StatusBadge status={session.status} />
      </div>
      <Alert msg={err} onClose={() => setErr("")} />
      <Alert type="success" msg={success} onClose={() => setSuccess("")} />

      <div className="card p-5 flex items-center justify-between flex-wrap gap-3">
        <div className="flex items-center gap-4">
          <span className="badge badge-draft">{session.environment?.toUpperCase()}</span>
          <span className="text-slate-900 font-semibold">{session.name}</span>
          {session.red_team_lead && <span className="text-xs text-slate-500">Red: {session.red_team_lead}</span>}
          {session.blue_team_lead && <span className="text-xs text-slate-500">Blue: {session.blue_team_lead}</span>}
        </div>
        <div className="flex gap-2">
          {session.status === "draft"  && <button className="btn-sm btn-emerald" onClick={doStart}><i className="fa-solid fa-play"></i>Start Session</button>}
          {session.status === "active" && <button className="btn-sm btn-blue" onClick={doComplete}><i className="fa-solid fa-check"></i>Complete Session</button>}
          {session.status === "completed" && <>
            <a href={`${API}/reports/purple/${id}/html`} target="_blank" className="btn-sm btn-blue"><i className="fa-solid fa-file-code"></i>HTML Report</a>
            <a href={`${API}/reports/purple/${id}/pdf`}  target="_blank" className="btn-sm btn-red" ><i className="fa-solid fa-file-pdf"></i>PDF Report</a>
            <a href={`${API}/stix/purple/${id}`}         target="_blank" className="btn-sm btn-purple"><i className="fa-solid fa-share-nodes"></i>STIX</a>
          </>}
        </div>
      </div>

      <div className="flex gap-2">
        {[["events",`Events (${events.length})`],["gaps",`Gaps (${gaps?.gap_techniques?.length??0})`]].map(([t,l])=>(
          <button key={t} onClick={() => setActiveTab(t)}
            className="px-4 py-2 rounded-lg text-sm font-semibold transition-all"
            style={activeTab===t?{background:"#7C3AED",color:"#fff"}:{color:"#64748b",background:"transparent"}}>
            {l}
          </button>
        ))}
      </div>

      {activeTab === "events" && (
        <div className="space-y-4">
          <div className="flex justify-end">
            <button className="btn-sm btn-purple" onClick={() => setShowEventForm(!showEventForm)}><i className="fa-solid fa-plus"></i>Record Red Action</button>
          </div>
          {showEventForm && (
            <div className="card p-5" style={{background:"#F8FAFC"}}>
              <form onSubmit={recordEvent} className="space-y-3">
                <div className="grid grid-cols-3 gap-3">
                  <FormField label="Technique ID" required>
                    <input className="input-field" required value={eventForm.technique_id}
                      onChange={e => setEventForm(f=>({...f,technique_id:e.target.value}))} placeholder="T1566.001" />
                  </FormField>
                  <FormField label="Technique Name">
                    <input className="input-field" value={eventForm.technique_name}
                      onChange={e => setEventForm(f=>({...f,technique_name:e.target.value}))} placeholder="Spearphishing Attachment" />
                  </FormField>
                  <FormField label="Tactic">
                    <input className="input-field" value={eventForm.tactic}
                      onChange={e => setEventForm(f=>({...f,tactic:e.target.value}))} placeholder="initial_access" />
                  </FormField>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <FormField label="Target"><input className="input-field" value={eventForm.target} onChange={e=>setEventForm(f=>({...f,target:e.target.value}))} placeholder="10.0.0.5" /></FormField>
                  <FormField label="Notes"><input className="input-field" value={eventForm.notes} onChange={e=>setEventForm(f=>({...f,notes:e.target.value}))} placeholder="Execution notes…" /></FormField>
                </div>
                <div className="flex gap-2">
                  <button type="submit" className="btn-sm btn-emerald">Record</button>
                  <button type="button" className="btn-ghost btn-sm" onClick={()=>setShowEventForm(false)}>Cancel</button>
                </div>
              </form>
            </div>
          )}

          {events.length === 0 ? (
            <div className="card p-10 text-center text-slate-600"><i className="fa-solid fa-list text-2xl mb-2 block"></i>No events yet</div>
          ) : events.map(ev => (
            <div key={ev.id} className="card p-4">
              <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <span className="font-mono font-semibold" style={{color:"#7C3AED"}}>{ev.technique_id}</span>
                  <span className="text-slate-900">{ev.technique_name||""}</span>
                  {ev.tactic && <span className="badge badge-draft">{ev.tactic}</span>}
                </div>
                <div className="flex items-center gap-2">
                  {ev.blue_response
                    ? <span className={`badge ${ev.blue_response==="detected"?"badge-active":ev.blue_response==="not_detected"?"badge-aborted":"badge-paused"}`}>{ev.blue_response}</span>
                    : session.status==="active" && <button className="btn-sm btn-blue" onClick={() => setResponding(ev.id)}>Respond</button>
                  }
                </div>
              </div>
              {ev.target && <div className="text-xs text-slate-500">Target: {ev.target}</div>}
              {ev.detection_latency_seconds != null && <div className="text-xs text-slate-500 mt-0.5">Latency: {ev.detection_latency_seconds}s · by: {ev.detected_by||"—"} · alert: {ev.triggered_alert||"—"}</div>}

              {responding === ev.id && (
                <form onSubmit={e=>submitResponse(ev.id,e)} className="mt-3 pt-3 space-y-3" style={{borderTop:"1px solid #E2E8F0"}}>
                  <div className="grid grid-cols-4 gap-3">
                    <FormField label="Blue Response">
                      <select className="input-field" value={respForm.blue_response} onChange={e=>setRespForm(f=>({...f,blue_response:e.target.value}))}>
                        {BLUE.map(r=><option key={r} value={r}>{r}</option>)}
                      </select>
                    </FormField>
                    <FormField label="Latency (sec)">
                      <input type="number" className="input-field" value={respForm.detection_latency_seconds} onChange={e=>setRespForm(f=>({...f,detection_latency_seconds:e.target.value}))} placeholder="120" />
                    </FormField>
                    <FormField label="Detected By">
                      <input className="input-field" value={respForm.detected_by} onChange={e=>setRespForm(f=>({...f,detected_by:e.target.value}))} placeholder="SIEM / EDR" />
                    </FormField>
                    <FormField label="Alert Rule">
                      <input className="input-field" value={respForm.triggered_alert} onChange={e=>setRespForm(f=>({...f,triggered_alert:e.target.value}))} placeholder="Alert name" />
                    </FormField>
                  </div>
                  <div className="flex gap-2">
                    <button type="submit" className="btn-sm btn-emerald">Submit Response</button>
                    <button type="button" className="btn-ghost btn-sm" onClick={()=>setResponding(null)}>Cancel</button>
                  </div>
                </form>
              )}
            </div>
          ))}
        </div>
      )}

      {activeTab === "gaps" && (
        <div className="space-y-4">
          {!gaps ? <Spinner /> : (
            <>
              <div className="grid grid-cols-4 gap-4">
                <StatCard icon="fa-eye-slash" color="red"    title="Detection Gaps"  value={gaps.gap_techniques?.length??0} sub="Undetected techniques" />
                <StatCard icon="fa-eye"       color="emerald" title="Detected"       value={gaps.detected_count??0}         sub="Successful detections" />
                <StatCard icon="fa-percent"   color="blue"   title="Detection Rate"  value={gaps.detection_rate!=null?`${Math.round(gaps.detection_rate*100)}%`:"—"} sub="Coverage" />
                <StatCard icon="fa-clock"     color="amber"  title="Avg Latency"     value={gaps.avg_detection_latency_seconds!=null?`${Math.round(gaps.avg_detection_latency_seconds)}s`:"—"} sub="Mean time to detect" />
              </div>
              {gaps.gap_techniques?.length > 0 && (
                <div className="card overflow-hidden">
                  <div className="px-5 py-4" style={{borderBottom:"1px solid #E2E8F0"}}>
                    <h3 className="font-semibold text-slate-900">Undetected Techniques</h3>
                  </div>
                  <table className="w-full text-sm">
                    <thead><tr style={{background:"#F8FAFC", borderBottom:"1px solid #E2E8F0"}}>
                      {["Technique","Name","Tactic","Events","Sigma Hint"].map(h=>(
                        <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">{h}</th>
                      ))}
                    </tr></thead>
                    <tbody className="divide-y" style={{borderColor:"#E2E8F0"}}>
                      {gaps.gap_techniques.map(g=>(
                        <tr key={g.technique_id} className="table-row">
                          <td className="px-4 py-3 font-mono font-semibold" style={{color:"#7C3AED"}}>{g.technique_id}</td>
                          <td className="px-4 py-3 text-slate-900">{g.technique_name||"—"}</td>
                          <td className="px-4 py-3 text-slate-500 text-xs">{g.tactic||"—"}</td>
                          <td className="px-4 py-3 text-slate-600">{g.event_count}</td>
                          <td className="px-4 py-3"><a href={`${API}/purple/sessions/${id}/sigma/${g.technique_id}`} target="_blank" className="btn-sm btn-purple">Sigma</a></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Reports & STIX ───────────────────────────────────────────────────────────
function Reports() {
  const [campaigns, setCampaigns] = useState(null);
  const [sessions, setSessions] = useState(null);
  const [selCamp, setSelCamp] = useState("");
  const [selSess, setSelSess] = useState("");
  const [tab, setTab] = useState("campaigns");

  useEffect(() => {
    apiFetch("/campaigns/").then(setCampaigns).catch(() => setCampaigns([]));
    apiFetch("/purple/sessions").then(setSessions).catch(() => setSessions([]));
  }, []);

  return (
    <div className="space-y-5">
      <div>
        <h1 className="text-xl font-bold text-slate-900">Reports & STIX Export</h1>
        <p className="text-sm text-slate-500 mt-1">Generate reports and export threat intelligence in STIX 2.1</p>
      </div>

      <div className="flex gap-2">
        {[["campaigns","Campaign Reports"],["purple","Purple Reports"],["stix","STIX 2.1"],["navigator","ATT&CK Navigator"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} className="px-4 py-2 rounded-lg text-sm font-semibold transition-all"
            style={tab===t?{background:"#7C3AED",color:"#fff"}:{color:"#64748b",background:"transparent"}}>
            {l}
          </button>
        ))}
      </div>

      {tab === "campaigns" && (
        <div className="card p-6 space-y-5">
          <h3 className="font-semibold text-slate-900">Campaign Reports</h3>
          {campaigns===null?<Spinner />:(
            <FormField label="Select Campaign">
              <select className="input-field" value={selCamp} onChange={e=>setSelCamp(e.target.value)}>
                <option value="">— Select a campaign —</option>
                {campaigns.map(c=><option key={c.id} value={c.id}>{c.name} [{c.status}]</option>)}
              </select>
            </FormField>
          )}
          {selCamp && (
            <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
              {[["JSON Report","fa-code","btn-purple",`/reports/campaigns/${selCamp}`],
                ["HTML Report","fa-file-code","btn-blue",`/reports/campaigns/${selCamp}/html`],
                ["PDF Report","fa-file-pdf","btn-red",`/reports/campaigns/${selCamp}/pdf`],
                ["Navigator Layer","fa-map","btn-emerald",`/reports/campaigns/${selCamp}/navigator`],
              ].map(([l,ic,cls,path])=>(
                <a key={l} href={`${API}${path}`} target="_blank" className={`btn-sm ${cls} justify-center py-3 text-sm`}>
                  <i className={`fa-solid ${ic}`}></i>{l}
                </a>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === "purple" && (
        <div className="card p-6 space-y-5">
          <h3 className="font-semibold text-slate-900">Purple Team Reports</h3>
          {sessions===null?<Spinner />:(
            <FormField label="Select Session">
              <select className="input-field" value={selSess} onChange={e=>setSelSess(e.target.value)}>
                <option value="">— Select a session —</option>
                {sessions.map(s=><option key={s.id} value={s.id}>{s.name} [{s.status}]</option>)}
              </select>
            </FormField>
          )}
          {selSess && (
            <div className="grid grid-cols-3 gap-3">
              {[["JSON Report","fa-code","btn-purple",`/reports/purple/${selSess}`],
                ["HTML Report","fa-file-code","btn-blue",`/reports/purple/${selSess}/html`],
                ["PDF Report","fa-file-pdf","btn-red",`/reports/purple/${selSess}/pdf`],
              ].map(([l,ic,cls,path])=>(
                <a key={l} href={`${API}${path}`} target="_blank" className={`btn-sm ${cls} justify-center py-3 text-sm`}>
                  <i className={`fa-solid ${ic}`}></i>{l}
                </a>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === "stix" && (
        <div className="space-y-4">
          <div className="card p-6 space-y-4">
            <h3 className="font-semibold text-slate-900">Campaign STIX 2.1 Bundle</h3>
            <p className="text-sm text-slate-500">Export as STIX 2.1 — compatible with MISP, OpenCTI, TAXII 2.1</p>
            {campaigns===null?<Spinner />:(
              <FormField label="Select Campaign">
                <select className="input-field" value={selCamp} onChange={e=>setSelCamp(e.target.value)}>
                  <option value="">— Select a campaign —</option>
                  {campaigns.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </FormField>
            )}
            {selCamp && (
              <div className="flex gap-3">
                <a href={`${API}/stix/campaigns/${selCamp}`} target="_blank" className="btn-sm btn-purple"><i className="fa-solid fa-share-nodes"></i>View Bundle</a>
                <a href={`${API}/stix/campaigns/${selCamp}/download`} target="_blank" className="btn-sm btn-blue"><i className="fa-solid fa-download"></i>Download .json</a>
              </div>
            )}
          </div>
          <div className="card p-6 space-y-4">
            <h3 className="font-semibold text-slate-900">Purple Session STIX Bundle</h3>
            {sessions===null?<Spinner />:(
              <FormField label="Select Session">
                <select className="input-field" value={selSess} onChange={e=>setSelSess(e.target.value)}>
                  <option value="">— Select a session —</option>
                  {sessions.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </FormField>
            )}
            {selSess && (
              <div className="flex gap-3">
                <a href={`${API}/stix/purple/${selSess}`} target="_blank" className="btn-sm btn-purple"><i className="fa-solid fa-share-nodes"></i>View Bundle</a>
                <a href={`${API}/stix/purple/${selSess}/download`} target="_blank" className="btn-sm btn-blue"><i className="fa-solid fa-download"></i>Download .json</a>
              </div>
            )}
          </div>
          <div className="card p-5 flex items-center justify-between">
            <div><h3 className="font-semibold text-slate-900 text-sm">AEP Identity Object</h3>
              <p className="text-xs text-slate-500 mt-0.5">STIX 2.1 Identity for use in TAXII feeds</p></div>
            <a href={`${API}/stix/identity`} target="_blank" className="btn-sm btn-ghost"><i className="fa-solid fa-id-card"></i>View Identity</a>
          </div>
        </div>
      )}

      {tab === "navigator" && (
        <div className="card p-6 space-y-4">
          <h3 className="font-semibold text-slate-900">ATT&CK Navigator Layers</h3>
          <div className="flex items-center justify-between p-4 rounded-lg" style={{background:"#EFF6FF",border:"1px solid #BFDBFE"}}>
            <div>
              <div className="text-sm font-medium text-slate-900">Platform-wide Layer</div>
              <div className="text-xs text-slate-500 mt-0.5">All campaigns combined</div>
            </div>
            <a href={`${API}/reports/navigator`} target="_blank" className="btn-sm btn-emerald"><i className="fa-solid fa-download"></i>Download</a>
          </div>
          {campaigns===null?<Spinner />:(
            <FormField label="Campaign-specific Layer">
              <div className="flex gap-2">
                <select className="input-field" value={selCamp} onChange={e=>setSelCamp(e.target.value)}>
                  <option value="">— Select a campaign —</option>
                  {campaigns.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                {selCamp && <a href={`${API}/reports/campaigns/${selCamp}/navigator`} target="_blank" className="btn-sm btn-emerald shrink-0"><i className="fa-solid fa-download"></i>Layer</a>}
              </div>
            </FormField>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>

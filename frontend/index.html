// ─── Campaign Detail ──────────────────────────────────────────────────────────
function CampaignDetail({ id, navigate }) {
  const [campaign, setCampaign] = useState(null);
  const [steps, setSteps] = useState([]);
  const [err, setErr] = useState("");
  const [success, setSuccess] = useState("");
  const [busy, setBusy] = useState(false);
  const [showAddStep, setShowAddStep] = useState(false);
  const [runTarget, setRunTarget] = useState({});
  const [runningStep, setRunningStep] = useState(null);
  const [planningStep, setPlanningStep] = useState(null); // stepId being planned
  const [runningMsg, setRunningMsg] = useState("");       // status message while running
  const [stepResults, setStepResults] = useState({});    // stepId → execution result
  const [expandedStep, setExpandedStep] = useState(null); // stepId with result open
  const [planData, setPlanData] = useState({});           // stepId → Shannon plan object
  const [editedCmd, setEditedCmd] = useState({});         // stepId → user-edited command string
  const [editedType, setEditedType] = useState({});       // stepId → current task_type selection
  const [stepForm, setStepForm] = useState({ phase:"initial_access", technique_id:"", method:"", notes:"", order_index:1, risk_assessment:"medium" });
  const [techSearch, setTechSearch] = useState("");           // search query for technique picker
  const [techSuggestions, setTechSuggestions] = useState([]); // list of matching techniques
  const [techPickerOpen, setTechPickerOpen] = useState(false);
  const [techSearchLoading, setTechSearchLoading] = useState(false);
  const [evadeLoading, setEvadeLoading] = useState({});       // stepId → bool: loading evasion alternatives
  const [evadeData, setEvadeData] = useState({});             // stepId → Shannon evasion alternatives
  const [scriptState, setScriptState] = useState({});        // stepId → {loading, scripts:[{url,filename,content,language,ext}]}
  const [deletingStep, setDeletingStep] = useState(null);     // stepId being deleted
  const [showConfirm, ConfirmNode] = useConfirm();

  // Detect script file URLs in a command string (.ps1/.py/.sh/.bat/.vbs/.rb/.php)
  const SCRIPT_EXT_RE = /\.(ps1|py|sh|bat|vbs|rb|php|js)(\?[^\s"']*)?(\s|"|'|\]|$)/i;
  function detectScriptUrls(command) {
    if (!command) return [];
    const matches = [];
    const re = /https?:\/\/[^\s"'<>\]]+/gi;
    let m;
    while ((m = re.exec(command)) !== null) {
      const url = m[0].replace(/[.,;)]+$/, "");
      if (SCRIPT_EXT_RE.test(url + " ")) {
        const filename = url.split("/").pop().split("?")[0];
        const ext = filename.split(".").pop().toLowerCase();
        if (!matches.find(x => x.url === url))
          matches.push({ url, filename, ext });
      }
    }
    return matches;
  }

  const load = useCallback(() => {
    apiFetch(`/campaigns/${id}`).then(setCampaign).catch(e => setErr(e.message));
    apiFetch(`/campaigns/${id}/steps`).then(setSteps).catch(() => {});
  }, [id]);
  useEffect(() => {
    load();
    // Load past execution results on mount (so results persist across page refresh)
    apiFetch(`/campaigns/${id}/executions`).then(execs => {
      const byStep = {};
      for (const ex of execs) { if (ex.step_id) byStep[ex.step_id] = ex; }
      setStepResults(byStep);
    }).catch(() => {});
  }, [id]);

  // Debounced technique search for the Add Step picker
  useEffect(() => {
    if (!techSearch.trim()) { setTechSuggestions([]); return; }
    const timer = setTimeout(async () => {
      setTechSearchLoading(true);
      try {
        const res = await apiFetch(`/techniques/?search=${encodeURIComponent(techSearch)}&limit=20`);
        setTechSuggestions(Array.isArray(res) ? res : (res.items || []));
      } catch { setTechSuggestions([]); }
      finally { setTechSearchLoading(false); }
    }, 300);
    return () => clearTimeout(timer);
  }, [techSearch]);

  function selectTechnique(tech) {
    // Map tactic → phase key used in the form
    const tacticMap = {
      "initial-access":"initial_access","execution":"execution","persistence":"persistence",
      "privilege-escalation":"privilege_escalation","defense-evasion":"defense_evasion",
      "credential-access":"credential_access","discovery":"discovery",
      "lateral-movement":"lateral_movement","collection":"collection",
      "exfiltration":"exfiltration","impact":"impact","command-and-control":"command_and_control",
      "reconnaissance":"initial_access","resource-development":"initial_access",
    };
    const tactic = (tech.tactic || "").toLowerCase();
    const phase = tacticMap[tactic] || tactic.replace(/-/g,"_") || "execution";
    // Default risk from severity if present, otherwise medium
    const riskMap = { "critical":"critical","high":"high","medium":"medium","low":"low" };
    const risk = riskMap[(tech.risk_level||"").toLowerCase()] || "medium";
    setStepForm(f => ({ ...f, technique_id: tech.id, phase, risk_assessment: risk }));
    setTechSearch(`${tech.id} — ${tech.name}`);
    setTechSuggestions([]);
    setTechPickerOpen(false);
  }

  async function startCampaign() {
    setBusy(true); setErr("");
    try { const r = await apiFetch(`/campaigns/${id}/start`, { method:"POST" }); setSuccess(r?.message || "Campaign started"); load(); }
    catch(ex) { setErr(ex.message); }
    finally { setBusy(false); }
  }
  async function abortCampaign() {
    const ok = await showConfirm({
      title: "Hentikan Campaign",
      message: "Semua aktivitas campaign akan dihentikan dan statusnya berubah menjadi aborted.",
      confirmLabel: "Ya, Hentikan",
      variant: "warning",
      icon: "fa-stop",
    });
    if (!ok) return;
    setBusy(true); setErr("");
    try { await apiFetch(`/campaigns/${id}/abort`, { method:"POST" }); setSuccess("Campaign aborted"); load(); }
    catch(ex) { setErr(ex.message); }
    finally { setBusy(false); }
  }
  async function addStep(e) {
    e.preventDefault(); setErr("");
    if (!stepForm.technique_id) { setErr("Pilih teknik terlebih dahulu."); return; }
    try {
      await apiFetch(`/campaigns/${id}/steps`, { method:"POST", body:JSON.stringify(stepForm) });
      setShowAddStep(false);
      setTechSearch("");
      setTechSuggestions([]);
      setStepForm({ phase:"initial_access", technique_id:"", method:"", notes:"", order_index:steps.length + 2, risk_assessment:"medium" });
      load();
    } catch(ex) { setErr(ex.message); }
  }
  // Step 1: Minta Shannon merencanakan perintah (tidak eksekusi)
  async function planStep(stepId, evCtx) {
    const target = runTarget[stepId];
    if (!target?.trim()) { setErr("Isi target IP/hostname terlebih dahulu."); return; }
    setPlanningStep(stepId); setErr("");
    try {
      let url = `/campaigns/${id}/steps/${stepId}/plan?target=${encodeURIComponent(target)}`;
      if (evCtx) url += `&evasion_context=${encodeURIComponent(evCtx)}`;
      const plan = await apiFetch(url);
      setPlanData(prev => ({ ...prev, [stepId]: plan }));
      setEditedCmd(prev => ({ ...prev, [stepId]: plan.command }));
      setEditedType(prev => ({ ...prev, [stepId]: plan.task_type }));
      // Detect script URLs in the planned command and pre-populate scriptState
      const allCmds = [plan.command, ...(plan.alternatives||[]).map(a=>a.command)].join("\n");
      const detected = detectScriptUrls(allCmds);
      if (detected.length > 0) {
        setScriptState(prev => ({
          ...prev,
          [stepId]: { scripts: detected.map(d => ({ ...d, loading: false, content: null, generated: false })) }
        }));
      } else {
        setScriptState(prev => { const n={...prev}; delete n[stepId]; return n; });
      }
    } catch(ex) {
      const msg = ex.message || "";
      if (msg.includes("rate-limited") || msg.includes("503") || msg.includes("429")) {
        setErr("Shannon AI sedang rate-limited — terlalu banyak request dalam waktu singkat. Tunggu ~60 detik lalu coba Re-plan.");
      } else {
        setErr(msg);
      }
    }
    finally { setPlanningStep(null); }
  }

  // Step 2: Eksekusi command yang sudah divalidasi / diedit user
  async function runStep(stepId) {
    const target = runTarget[stepId];
    const plan = planData[stepId];
    const cmd = editedCmd[stepId];
    if (!target?.trim()) { setErr("Isi target IP/hostname terlebih dahulu."); return; }
    setRunningStep(stepId); setErr(""); setRunningMsg("Mengirim perintah ke agent…");

    const msgs = [
      [3000,  "Command dikirim → menunggu agent beacon…"],
      [15000, "Agent sedang mengeksekusi perintah…"],
      [40000, "Menunggu agent melaporkan hasil…"],
      [80000, "Masih berjalan — beacon interval mungkin panjang…"],
    ];
    const timers = msgs.map(([ms, msg]) => setTimeout(() => setRunningMsg(msg), ms));

    try {
      const currentType = editedType[stepId] || plan?.task_type;
      const body = {};
      if (plan && cmd && currentType !== "simulation") {
        body.override_command = cmd;
        body.override_task_type = currentType;
      }
      const r = await apiFetch(
        `/campaigns/${id}/steps/${stepId}/run?target=${encodeURIComponent(target)}`,
        { method:"POST", body: JSON.stringify(body), _timeout: 200000 }
      );
      if (r && r.success === false) throw new Error(r.error || "Step execution failed");
      await reloadExecutions();
      setExpandedStep(stepId);
      // Clear plan setelah berhasil dieksekusi
      setPlanData(prev => { const n={...prev}; delete n[stepId]; return n; });
      setEditedCmd(prev => { const n={...prev}; delete n[stepId]; return n; });
      setEditedType(prev => { const n={...prev}; delete n[stepId]; return n; });
      setScriptState(prev => { const n={...prev}; delete n[stepId]; return n; });
      load();
    }
    catch(ex) { setErr(ex.message); setExpandedStep(null); }
    finally {
      timers.forEach(t => clearTimeout(t));
      setRunningStep(null);
      setRunningMsg("");
    }
  }

  function cancelPlan(stepId) {
    setPlanData(prev => { const n={...prev}; delete n[stepId]; return n; });
    setEditedCmd(prev => { const n={...prev}; delete n[stepId]; return n; });
    setEditedType(prev => { const n={...prev}; delete n[stepId]; return n; });
    setScriptState(prev => { const n={...prev}; delete n[stepId]; return n; });
  }

  function applyAlternative(stepId, alt) {
    setEditedCmd(prev => ({ ...prev, [stepId]: alt.command }));
    setEditedType(prev => ({ ...prev, [stepId]: alt.task_type }));
    // Re-detect script URLs in the applied alternative
    const found = detectScriptUrls(alt.command);
    setScriptState(prev => {
      if (found.length === 0) { const n={...prev}; delete n[stepId]; return n; }
      const cur = prev[stepId] || { scripts: [] };
      const next = found.map(d => cur.scripts.find(x=>x.url===d.url) || { ...d, loading:false, content:null, generated:false });
      return { ...prev, [stepId]: { scripts: next } };
    });
  }

  async function reloadExecutions() {
    try {
      const execs = await apiFetch(`/campaigns/${id}/executions`);
      const byStep = {};
      for (const ex of execs) {
        if (ex.step_id) byStep[ex.step_id] = ex;
      }
      setStepResults(byStep);
    } catch {}
  }

  // Ask Shannon for evasion / retry alternatives after a failed or detected execution
  async function askEvadeAlternatives(stepId, res) {
    // Ensure target is set so planStep can work
    if (!runTarget[stepId] && res.target) {
      setRunTarget(prev => ({ ...prev, [stepId]: res.target }));
    }
    setEvadeLoading(prev => ({ ...prev, [stepId]: true }));
    const evCtx = res.status === "failed"
      ? `Previous attempt FAILED: ${(res.error_message || "unknown error").slice(0, 200)}`
      : `Previous attempt was DETECTED by security controls. Need a stealthier variant.`;
    try {
      await planStep(stepId, evCtx);
    } catch(ex) { setErr(ex.message); }
    finally { setEvadeLoading(prev => ({ ...prev, [stepId]: false })); }
  }

  async function generateScript(stepId, scriptRef, commandContext) {
    setScriptState(prev => {
      const cur = prev[stepId] || { scripts: [] };
      const scripts = cur.scripts.map(s =>
        s.url === scriptRef.url ? { ...s, loading: true } : s
      );
      return { ...prev, [stepId]: { ...cur, scripts } };
    });
    try {
      const result = await apiFetch(
        `/campaigns/${id}/steps/${stepId}/generate-script` +
        `?script_url=${encodeURIComponent(scriptRef.url)}` +
        `&command_context=${encodeURIComponent((commandContext || "").slice(0, 600))}`
        , { method: "POST" }
      );
      setScriptState(prev => {
        const cur = prev[stepId] || { scripts: [] };
        const scripts = cur.scripts.map(s =>
          s.url === scriptRef.url ? { ...s, loading: false, content: result.content,
            language: result.language, generated: true } : s
        );
        return { ...prev, [stepId]: { ...cur, scripts } };
      });
    } catch(ex) {
      setScriptState(prev => {
        const cur = prev[stepId] || { scripts: [] };
        const scripts = cur.scripts.map(s =>
          s.url === scriptRef.url ? { ...s, loading: false, error: ex.message } : s
        );
        return { ...prev, [stepId]: { ...cur, scripts } };
      });
    }
  }

  async function deleteStep(stepId) {
    const ok = await showConfirm({
      title: "Hapus Attack Step",
      message: "Step ini dan seluruh riwayat eksekusinya akan dihapus permanen.\nTindakan ini tidak bisa dibatalkan.",
      confirmLabel: "Ya, Hapus Step",
      variant: "danger",
    });
    if (!ok) return;
    setDeletingStep(stepId);
    try {
      await apiFetch(`/campaigns/${id}/steps/${stepId}`, { method:"DELETE" });
      cancelPlan(stepId);
      load();
    } catch(ex) { setErr(ex.message); }
    finally { setDeletingStep(null); }
  }

  function downloadScript(filename, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  if (!campaign) return <Spinner />;
  const canStart = ["draft","paused"].includes(campaign.status);
  const canAbort = campaign.status === "active";

  return (
    <div className="space-y-5">
      {ConfirmNode}
      <div className="flex items-center gap-3">
        <button onClick={() => navigate("campaigns")} className="btn-ghost"><i className="fa-solid fa-arrow-left mr-1.5"></i>Back</button>
        <span className="text-slate-400">/</span>
        <span className="text-slate-900 font-semibold">{campaign.name}</span>
        <StatusBadge status={campaign.status} />
      </div>
      <Alert msg={err} onClose={() => setErr("")} />
      <Alert type="success" msg={success} onClose={() => setSuccess("")} />

      <div className="grid grid-cols-3 gap-4">
        <div className="col-span-2 card p-5 space-y-4">
          <div className="flex items-start justify-between gap-3">
            <div>
              <h2 className="text-lg font-bold text-slate-900">{campaign.name}</h2>
              <p className="text-sm text-slate-500">{campaign.description || "—"}</p>
            </div>
            <div className="flex gap-2 shrink-0">
              {canStart && <button className="btn-sm btn-emerald" onClick={startCampaign} disabled={busy}><i className="fa-solid fa-play"></i>{busy?"Starting…":"Start"}</button>}
              {canAbort && <button className="btn-sm btn-red" onClick={abortCampaign} disabled={busy}><i className="fa-solid fa-stop"></i>Abort</button>}
            </div>
          </div>
          <div className="grid grid-cols-3 gap-4 text-sm">
            {[["Client", campaign.client_name],["Type", campaign.engagement_type],["Environment", campaign.environment_type?.toUpperCase()],
              ["Safe Mode", campaign.production_safe_mode?"✓ Enabled":"✗ Disabled"],["Emergency", campaign.emergency_contact||"—"],["Steps", steps.length]].map(([l,v])=>(
              <div key={l}><div className="text-xs text-slate-500 uppercase tracking-wider mb-0.5">{l}</div><div className="text-slate-900 font-medium">{v}</div></div>
            ))}
          </div>
          {campaign.rules_of_engagement && (
            <div className="p-3 rounded-lg text-sm text-slate-600" style={{background:"#F8FAFC",border:"1px solid #E2E8F0"}}>
              <div className="text-xs text-slate-500 uppercase tracking-wider mb-1 font-semibold">Rules of Engagement</div>
              {campaign.rules_of_engagement}
            </div>
          )}
          {campaign.target_ips?.length > 0 && (
            <div><div className="text-xs text-slate-500 uppercase tracking-wider mb-1.5">Target IPs</div>
              <div className="flex flex-wrap gap-1.5">{campaign.target_ips.map(ip=><span key={ip} className="tag-chip">{ip}</span>)}</div>
            </div>
          )}
        </div>
        <div className="card p-5">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Reports & Export</p>
          <div className="space-y-1.5">
            {[["JSON Report","fa-code",`/reports/campaigns/${id}`],["HTML Report","fa-file-code",`/reports/campaigns/${id}/html`],
              ["PDF Report","fa-file-pdf",`/reports/campaigns/${id}/pdf`],["ATT&CK Navigator","fa-map",`/reports/campaigns/${id}/navigator`],
              ["STIX Bundle","fa-share-nodes",`/stix/campaigns/${id}`],["STIX Download","fa-download",`/stix/campaigns/${id}/download`]].map(([l,ic,p])=>(
              <a key={l} href={`${API}${p}`} target="_blank"
                className="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-50 text-sm text-slate-600 hover:text-slate-900 transition-all">
                <i className={`fa-solid ${ic} w-4 text-center text-blue-500 text-xs`}></i>{l}
              </a>
            ))}
          </div>
        </div>
      </div>

      {/* Steps */}
      <div className="card overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid #E2E8F0"}}>
          <div><h3 className="font-semibold text-slate-900">Attack Steps</h3><p className="text-xs text-slate-500 mt-0.5">{steps.length} steps</p></div>
          <button className="btn-sm btn-purple" onClick={() => setShowAddStep(!showAddStep)}><i className="fa-solid fa-plus"></i>Add Step</button>
        </div>

        {showAddStep && (
          <div className="p-5" style={{borderBottom:"1px solid #E2E8F0",background:"#F8FAFC"}}>
            <form onSubmit={addStep} className="space-y-3">
              {/* Technique search picker */}
              <FormField label="Technique" required>
                <div className="relative">
                  <input
                    className="input-field w-full"
                    placeholder="Search by ID or name… e.g. T1059 or 'credential dump'"
                    value={techSearch}
                    onFocus={() => { if (techSearch) setTechPickerOpen(true); }}
                    onChange={e => { setTechSearch(e.target.value); setTechPickerOpen(true);
                      // If user clears, also clear the technique_id
                      if (!e.target.value) setStepForm(f=>({...f,technique_id:"",phase:"initial_access",risk_assessment:"medium"}));
                    }}
                    autoComplete="off"
                  />
                  {techSearchLoading && (
                    <span className="absolute right-3 top-2.5 text-slate-500 text-xs">searching…</span>
                  )}
                  {techPickerOpen && techSuggestions.length > 0 && (
                    <div className="absolute z-50 w-full mt-1 rounded-lg shadow-xl border overflow-y-auto"
                         style={{background:"#ffffff",borderColor:"#E2E8F0",maxHeight:"260px"}}>
                      {techSuggestions.map(t => (
                        <div key={t.id}
                          className="px-3 py-2 cursor-pointer hover:bg-slate-50 flex items-start gap-3"
                          onMouseDown={e => { e.preventDefault(); selectTechnique(t); }}>
                          <span className="font-mono text-xs text-emerald-600 shrink-0 mt-0.5 w-20">{t.id}</span>
                          <div className="flex-1 min-w-0">
                            <div className="text-sm text-slate-900 truncate">{t.name}</div>
                            <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                              <span className="text-xs text-slate-500">{t.tactic}</span>
                              {t.risk_level && <span className={`text-xs px-1 rounded badge-${t.risk_level}`}>{t.risk_level}</span>}
                              {t.environment && (
                                <span className="text-xs px-1.5 py-0 rounded font-semibold"
                                  style={{
                                    background: t.environment==="ot" ? "#FEF3C7" : t.environment==="both" ? "#EDE9FE" : "#F1F5F9",
                                    color: t.environment==="ot" ? "#b45309" : t.environment==="both" ? "#7C3AED" : "#64748b",
                                    border: `1px solid ${t.environment==="ot" ? "#FDE68A" : t.environment==="both" ? "#DDD6FE" : "#CBD5E1"}`
                                  }}>
                                  {t.environment==="ot" ? "OT/ICS" : t.environment==="both" ? "IT+OT" : "IT"}
                                </span>
                              )}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {/* Show auto-filled badge */}
                {stepForm.technique_id && (
                  <div className="mt-1 flex gap-2 text-xs">
                    <span className="px-2 py-0.5 rounded bg-emerald-50 text-emerald-700 font-mono border border-emerald-200">{stepForm.technique_id}</span>
                    <span className="px-2 py-0.5 rounded bg-slate-100 text-slate-600 border border-slate-200">{stepForm.phase}</span>
                    <span className={`px-2 py-0.5 rounded badge-${stepForm.risk_assessment}`}>{stepForm.risk_assessment}</span>
                    <button type="button" className="text-slate-500 hover:text-red-400" onClick={()=>{ setTechSearch(""); setStepForm(f=>({...f,technique_id:"",phase:"initial_access",risk_assessment:"medium"})); }}>✕ clear</button>
                  </div>
                )}
              </FormField>

              <div className="grid grid-cols-3 gap-3">
                <FormField label="Order #">
                  <input type="number" min={0} className="input-field" value={stepForm.order_index} onChange={e=>setStepForm(f=>({...f,order_index:parseInt(e.target.value)||0}))} />
                </FormField>
                <FormField label="Method"><input className="input-field" value={stepForm.method} onChange={e=>setStepForm(f=>({...f,method:e.target.value}))} placeholder="spearphish, exploit, script…" /></FormField>
                <FormField label="Notes"><input className="input-field" value={stepForm.notes} onChange={e=>setStepForm(f=>({...f,notes:e.target.value}))} placeholder="Notes…" /></FormField>
              </div>
              <div className="flex gap-2">
                <button type="submit" className="btn-sm btn-emerald">Add Step</button>
                <button type="button" className="btn-ghost btn-sm" onClick={() => setShowAddStep(false)}>Cancel</button>
              </div>
            </form>
          </div>
        )}

        {steps.length === 0 ? (
          <div className="text-center py-12 text-slate-600"><i className="fa-solid fa-list-check text-3xl mb-3 block"></i>No steps yet</div>
        ) : (
          <table className="w-full text-sm">
            <thead><tr style={{background:"#F8FAFC", borderBottom:"1px solid #E2E8F0"}}>
              {["#","Phase","Technique","Method","Risk","Status","Plan & Run",""].map(h=>(
                <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">{h}</th>
              ))}
            </tr></thead>
            <tbody className="divide-y" style={{borderColor:"#E2E8F0"}}>
              {steps.map(s => {
                const res = stepResults[s.id];
                const isExpanded = expandedStep === s.id;
                const hasResult = !!res;
                const findings = res?.findings || [];
                const detected = findings.some(f => f.detected);
                const via = res?.dispatched_via;
                const plan = planData[s.id];
                const hasPlan = !!plan;
                const isPlanning = planningStep === s.id;
                const isRunning = runningStep === s.id;

                return (
                  <React.Fragment key={s.id}>
                    <tr className="table-row">
                      <td className="px-4 py-3 text-slate-500 font-mono text-xs">{s.order_index}</td>
                      <td className="px-4 py-3 text-slate-400 text-xs">{s.phase}</td>
                      <td className="px-4 py-3 font-mono font-semibold" style={{color:"#a78bfa"}}>{s.technique_id}</td>
                      <td className="px-4 py-3 text-slate-400 text-xs max-w-[140px] truncate">{s.method || "—"}</td>
                      <td className="px-4 py-3"><span className={`badge badge-${s.risk_assessment}`}>{s.risk_assessment}</span></td>
                      <td className="px-4 py-3">
                        <span className={`badge badge-${s.status}`}>{s.status}</span>
                        {via && <span className="ml-1 text-xs text-slate-600">({via.replace(/_/g," ")})</span>}
                      </td>
                      <td className="px-4 py-3">
                        <div className="flex flex-col gap-1">
                          <div className="flex items-center gap-2 flex-wrap">
                            <input className="input-field" style={{width:"110px",padding:"0.25rem 0.5rem"}} placeholder="IP / hostname"
                              value={runTarget[s.id]||""} onChange={e=>setRunTarget(t=>({...t,[s.id]:e.target.value}))} />
                            {/* Plan button — visible if no plan yet, or if planning (shows spinner) */}
                            {(!hasPlan || isPlanning) && !hasPlan && (
                              <button className="btn-sm btn-blue" disabled={!!runningStep}
                                onClick={()=>planStep(s.id)}
                                title="Ask Shannon AI to plan this technique">
                                {isPlanning
                                  ? <><i className="fa-solid fa-circle-notch spin mr-1"></i>Planning…</>
                                  : <><i className="fa-solid fa-wand-magic-sparkles mr-1"></i>Plan</>}
                              </button>
                            )}
                            {/* Execute button — visible after plan is ready */}
                            {hasPlan && (
                              <>
                                <button className="btn-sm btn-emerald" disabled={isRunning || isPlanning}
                                  onClick={()=>runStep(s.id)}
                                  title="Execute the command below">
                                  {isRunning
                                    ? <><i className="fa-solid fa-circle-notch spin mr-1"></i>Running…</>
                                    : <><i className="fa-solid fa-play mr-1"></i>Execute</>}
                                </button>
                                <button className="btn-sm btn-ghost" disabled={isRunning}
                                  onClick={()=>cancelPlan(s.id)} title="Dismiss plan">
                                  <i className="fa-solid fa-xmark"></i>
                                </button>
                              </>
                            )}
                            {hasResult && (
                              <button className="btn-sm btn-ghost" onClick={()=>setExpandedStep(isExpanded ? null : s.id)}>
                                <i className={`fa-solid fa-chevron-${isExpanded?"up":"down"} mr-1`}></i>Result
                              </button>
                            )}
                          </div>
                          {isRunning && runningMsg && (
                            <span className="text-xs" style={{color:"#a78bfa"}}>
                              <i className="fa-solid fa-circle-notch spin mr-1" style={{fontSize:"0.6rem"}}></i>
                              {runningMsg}
                            </span>
                          )}
                        </div>
                      </td>
                      <td className="px-3 py-3">
                        <button
                          onClick={() => deleteStep(s.id)}
                          disabled={deletingStep === s.id || isRunning}
                          title="Hapus step"
                          className="text-slate-600 hover:text-red-400 transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                        >
                          {deletingStep === s.id
                            ? <i className="fa-solid fa-circle-notch spin text-xs"></i>
                            : <i className="fa-solid fa-trash text-xs"></i>}
                        </button>
                      </td>
                    </tr>

                    {/* ── Plan Review Panel ── */}
                    {(hasPlan || isPlanning) && (() => {
                      const panelPlan = plan; // may be null if first-time planning
                      const cmdVal = editedCmd[s.id] ?? panelPlan?.command ?? "";
                      const typeVal = editedType[s.id] || panelPlan?.task_type || "shell_command";
                      return (
                      <tr><td colSpan={8} className="fade-in" style={{
                        background:"#EFF6FF",
                        borderBottom:"1px solid #BFDBFE",
                        borderTop:"1px solid #BFDBFE",
                        padding:"1.25rem 1.5rem"
                      }}>
                        {isPlanning && !panelPlan ? (
                          /* Loading skeleton while planning for the first time */
                          <div className="flex items-center gap-3 text-slate-500 text-sm">
                            <i className="fa-solid fa-circle-notch spin" style={{color:"#3b82f6"}}></i>
                            <span>Shannon AI sedang merencanakan…</span>
                          </div>
                        ) : panelPlan && (
                        <div className="space-y-4">

                          {/* ── Header ── */}
                          <div className="flex items-start justify-between gap-3">
                            <div className="flex items-center gap-2.5 flex-wrap">
                              <span className="text-xs font-semibold tracking-wide" style={{color:"#60a5fa"}}>
                                <i className="fa-solid fa-wand-magic-sparkles mr-1.5" style={{color:"#818cf8"}}></i>
                                Shannon AI Plan
                              </span>
                              <span className="text-xs text-slate-500">
                                {panelPlan.technique_id}
                                {panelPlan.technique_name && panelPlan.technique_name !== panelPlan.technique_id
                                  ? ` · ${panelPlan.technique_name}` : ""}
                              </span>
                              {panelPlan.tactic && (
                                <span className="text-xs px-2 py-0 rounded-full"
                                  style={{background:"#DBEAFE",color:"#1d4ed8",letterSpacing:"0.03em"}}>
                                  {panelPlan.tactic}
                                </span>
                              )}
                            </div>
                            <div className="flex items-center gap-2 shrink-0">
                              {panelPlan.has_agent
                                ? <span className="flex items-center gap-1.5 text-xs px-2 py-1 rounded-md"
                                    style={{background:"#052e16",color:"#4ade80",border:"1px solid #14532d"}}>
                                    <i className="fa-solid fa-circle text-[6px]" style={{color:"#22c55e"}}></i>
                                    {panelPlan.agent_hostname}
                                    <span className="text-slate-500">·</span>
                                    <span style={{color:"#86efac"}}>{panelPlan.agent_os}</span>
                                    <span className="text-slate-500">·</span>
                                    <span style={{color:"#6ee7b7"}}>{panelPlan.agent_privilege}</span>
                                  </span>
                                : <span className="flex items-center gap-1.5 text-xs px-2 py-1 rounded-md"
                                    style={{background:"#1c1107",color:"#f59e0b",border:"1px solid #78350f"}}>
                                    <i className="fa-solid fa-triangle-exclamation text-[9px]"></i>
                                    Simulation — no agent
                                  </span>}
                            </div>
                          </div>

                          {/* ── Explanation ── */}
                          {panelPlan.explanation && (
                            <p className="text-xs leading-relaxed"
                              style={{color:"#475569",borderLeft:"2px solid #93C5FD",paddingLeft:"0.75rem",fontStyle:"italic"}}>
                              {panelPlan.explanation}
                            </p>
                          )}

                          {/* ── Command editor ── */}
                          <div className="rounded-lg overflow-hidden" style={{border:"1px solid #93C5FD"}}>
                            {/* Toolbar */}
                            <div className="flex items-center justify-between px-3 py-2"
                              style={{background:"#DBEAFE",borderBottom:"1px solid #93C5FD"}}>
                              <div className="flex items-center gap-2">
                                <span className="text-xs text-slate-600">
                                  {panelPlan.has_agent ? "Command" : "Payload"}
                                </span>
                                <select
                                  style={{background:"#ffffff",color:"#374151",border:"1px solid #93C5FD",
                                          padding:"0.1rem 0.4rem",fontSize:"0.7rem",borderRadius:"0.25rem",outline:"none"}}
                                  value={typeVal}
                                  onChange={e=>setEditedType(prev=>({...prev,[s.id]:e.target.value}))}>
                                  {[
                                    ["shell_command","cmd / shell"],
                                    ["powershell","powershell"],
                                    ["python_exec","python -c (auto-wrap)"],
                                    ["simulation","simulation"],
                                  ].map(([v,l])=>(
                                    <option key={v} value={v}>{l}</option>
                                  ))}
                                </select>
                              </div>
                              <button
                                className="text-xs text-slate-600 hover:text-slate-400 transition-colors"
                                type="button"
                                title="Reset to original"
                                onClick={()=>{
                                  const orig = planData[s.id];
                                  if (orig) {
                                    setEditedCmd(prev=>({...prev,[s.id]:orig.command}));
                                    setEditedType(prev=>({...prev,[s.id]:orig.task_type}));
                                  }
                                }}>
                                <i className="fa-solid fa-rotate-left mr-1"></i>Reset
                              </button>
                            </div>
                            {/* Textarea */}
                            <textarea
                              style={{
                                width:"100%", minHeight:"88px", resize:"vertical",
                                background:"#050d18", color:"#7dd3fc",
                                border:"none", outline:"none",
                                padding:"0.75rem 1rem",
                                fontFamily:"'JetBrains Mono','Fira Code','Courier New',monospace",
                                fontSize:"0.78rem", lineHeight:"1.65",
                                boxSizing:"border-box", display:"block"
                              }}
                              value={cmdVal}
                              onChange={e => {
                                const v = e.target.value;
                                setEditedCmd(prev => ({...prev, [s.id]: v}));
                                // Re-detect script URLs as user edits
                                const found = detectScriptUrls(v);
                                setScriptState(prev => {
                                  const cur = prev[s.id] || { scripts: [] };
                                  // Merge: keep existing generated ones, add new, remove gone
                                  const next = found.map(d => {
                                    const existing = cur.scripts.find(x => x.url === d.url);
                                    return existing || { ...d, loading: false, content: null, generated: false };
                                  });
                                  if (next.length === 0) { const n={...prev}; delete n[s.id]; return n; }
                                  return { ...prev, [s.id]: { scripts: next } };
                                });
                              }}
                              spellCheck={false}
                              autoComplete="off"
                            />
                          </div>

                          {/* ── Alternatives ── */}
                          {panelPlan.alternatives?.length > 0 && (
                            <div>
                              <p className="text-xs text-slate-600 uppercase tracking-wider mb-2 font-medium">
                                <i className="fa-solid fa-code-branch mr-1.5"></i>Alternative payloads
                              </p>
                              <div className="grid gap-2" style={{gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))"}}>
                                {panelPlan.alternatives.map((alt, i) => (
                                  <button key={i} type="button"
                                    className="text-left p-3 rounded-lg transition-all"
                                    style={{background:"#ffffff",border:"1px solid #BFDBFE"}}
                                    onClick={()=>applyAlternative(s.id, alt)}
                                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#2563eb";e.currentTarget.style.background="#F0F7FF"}}
                                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#BFDBFE";e.currentTarget.style.background="#ffffff"}}>
                                    <div className="flex items-center gap-2 mb-1.5">
                                      <span className="text-xs font-semibold" style={{color:"#2563eb"}}>
                                        {alt.label || `Variant ${i+1}`}
                                      </span>
                                      <span className="text-xs px-1.5 rounded"
                                        style={{background:"#F1F5F9",color:"#64748b",border:"1px solid #CBD5E1"}}>
                                        {alt.task_type}
                                      </span>
                                      <span className="ml-auto text-xs" style={{color:"#2563eb"}}>
                                        <i className="fa-solid fa-arrow-right-to-bracket text-[9px]"></i>
                                      </span>
                                    </div>
                                    {alt.explanation && (
                                      <p className="text-xs mb-1.5 leading-relaxed" style={{color:"#64748b"}}>{alt.explanation}</p>
                                    )}
                                    <div className="text-xs truncate" style={{
                                      fontFamily:"'JetBrains Mono','Fira Code',monospace",
                                      color:"#0369a1",opacity:0.85
                                    }} title={alt.command}>{alt.command}</div>
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* ── Script Generator ── */}
                          {(() => {
                            const ss = scriptState[s.id];
                            if (!ss || ss.scripts.length === 0) return null;
                            return (
                              <div className="rounded-lg overflow-hidden" style={{border:"1px solid #DDD6FE"}}>
                                {/* Header */}
                                <div className="flex items-center gap-2 px-3 py-2"
                                  style={{background:"#EDE9FE",borderBottom:"1px solid #DDD6FE"}}>
                                  <i className="fa-solid fa-file-code text-xs" style={{color:"#7C3AED"}}></i>
                                  <span className="text-xs font-semibold" style={{color:"#7C3AED"}}>Script Files Detected</span>
                                  <span className="text-xs text-slate-500">— Shannon can write the content</span>
                                </div>
                                {/* Script cards */}
                                <div className="divide-y" style={{divideColor:"#DDD6FE"}}>
                                  {ss.scripts.map((sc, si) => (
                                    <div key={si} className="px-3 py-2.5"
                                      style={{background:"#F5F3FF"}}>
                                      <div className="flex items-center gap-2 flex-wrap">
                                        {/* Filename + ext badge */}
                                        <i className="fa-solid fa-file-lines text-xs text-slate-700"></i>
                                        <span className="font-mono text-xs" style={{color:"#7C3AED"}}>{sc.filename}</span>
                                        <span className="text-xs px-1.5 rounded"
                                          style={{background:"#EDE9FE",color:"#7C3AED",border:"1px solid #DDD6FE",fontFamily:"monospace"}}>
                                          .{sc.ext}
                                        </span>
                                        <span className="text-xs text-slate-700 truncate max-w-[180px]" title={sc.url}>{sc.url}</span>

                                        <div className="ml-auto flex items-center gap-1.5">
                                          {/* Generate button */}
                                          {!sc.generated && (
                                            <button type="button"
                                              className="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-md transition-all"
                                              style={{background:"#EDE9FE",color:"#7C3AED",border:"1px solid #DDD6FE",fontWeight:600}}
                                              disabled={sc.loading}
                                              onClick={()=>generateScript(s.id, sc, cmdVal)}
                                              onMouseEnter={e=>{if(!sc.loading){e.currentTarget.style.background="#DDD6FE"}}}
                                              onMouseLeave={e=>{e.currentTarget.style.background="#EDE9FE"}}>
                                              {sc.loading
                                                ? <><i className="fa-solid fa-circle-notch spin text-[10px]"></i><span>Generating…</span></>
                                                : <><i className="fa-solid fa-wand-magic-sparkles text-[10px]"></i><span>Generate</span></>}
                                            </button>
                                          )}
                                          {/* Download button — shown after generation */}
                                          {sc.generated && sc.content && (
                                            <button type="button"
                                              className="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-md transition-all"
                                              style={{background:"#052e16",color:"#4ade80",border:"1px solid #14532d",fontWeight:600}}
                                              onClick={()=>downloadScript(sc.filename, sc.content)}
                                              onMouseEnter={e=>{e.currentTarget.style.background="#064e26"}}
                                              onMouseLeave={e=>{e.currentTarget.style.background="#052e16"}}>
                                              <i className="fa-solid fa-download text-[10px]"></i>
                                              <span>Download {sc.filename}</span>
                                            </button>
                                          )}
                                          {/* Re-generate */}
                                          {sc.generated && (
                                            <button type="button"
                                              className="text-xs text-slate-700 hover:text-slate-500 transition-colors px-1"
                                              onClick={()=>generateScript(s.id, sc, cmdVal)}
                                              title="Re-generate">
                                              <i className="fa-solid fa-arrows-rotate text-[10px]"></i>
                                            </button>
                                          )}
                                        </div>
                                      </div>

                                      {/* Error */}
                                      {sc.error && (
                                        <p className="mt-1.5 text-xs" style={{color:"#f87171"}}>{sc.error}</p>
                                      )}

                                      {/* Script preview (collapsible) */}
                                      {sc.generated && sc.content && (
                                        <details className="mt-2">
                                          <summary className="cursor-pointer text-xs text-slate-600 hover:text-slate-400 transition-colors select-none">
                                            <i className="fa-solid fa-eye mr-1 text-[10px]"></i>Preview script
                                          </summary>
                                          <div className="mt-2 rounded overflow-hidden" style={{border:"1px solid #DDD6FE"}}>
                                            <div className="flex items-center justify-between px-3 py-1.5"
                                              style={{background:"#EDE9FE",borderBottom:"1px solid #DDD6FE"}}>
                                              <span className="text-xs text-slate-600 font-mono">{sc.filename}</span>
                                              <button type="button"
                                                className="text-xs text-slate-600 hover:text-emerald-400 transition-colors"
                                                onClick={()=>downloadScript(sc.filename, sc.content)}>
                                                <i className="fa-solid fa-download mr-1 text-[9px]"></i>Download
                                              </button>
                                            </div>
                                            <pre style={{
                                              margin:0, padding:"0.75rem 1rem",
                                              background:"#050311", color:"#c4b5fd",
                                              fontFamily:"'JetBrains Mono','Fira Code',monospace",
                                              fontSize:"0.72rem", lineHeight:"1.6",
                                              maxHeight:"280px", overflowY:"auto",
                                              whiteSpace:"pre-wrap", wordBreak:"break-word"
                                            }}>{sc.content}</pre>
                                          </div>
                                        </details>
                                      )}
                                    </div>
                                  ))}
                                </div>
                              </div>
                            );
                          })()}

                          {/* ── Action bar ── */}
                          <div className="flex items-center gap-2 pt-1" style={{borderTop:"1px solid #0f1f33"}}>
                            <button className="btn-sm btn-emerald" disabled={isRunning} onClick={()=>runStep(s.id)}>
                              {isRunning
                                ? <><i className="fa-solid fa-circle-notch spin mr-1.5"></i>Running…</>
                                : <><i className="fa-solid fa-play mr-1.5 text-[9px]"></i>Execute</>}
                            </button>
                            <button className="btn-sm btn-blue" disabled={isPlanning || isRunning}
                              onClick={()=>planStep(s.id)}
                              title="Ask Shannon for a new plan">
                              {isPlanning
                                ? <><i className="fa-solid fa-circle-notch spin mr-1.5"></i>Re-planning…</>
                                : <><i className="fa-solid fa-arrows-rotate mr-1.5"></i>Re-plan</>}
                            </button>
                            <button type="button"
                              className="btn-sm btn-ghost"
                              disabled={isRunning || isPlanning}
                              onClick={()=>cancelPlan(s.id)}>
                              <i className="fa-solid fa-xmark mr-1"></i>Dismiss
                            </button>
                          </div>
                        </div>
                        )}
                      </td></tr>
                      );
                    })()}

                    {/* ── Execution Result Panel ── */}
                    {isExpanded && res && (
                      <tr><td colSpan={8} className="fade-in" style={{
                        background:"#F0FDF4",padding:"1.25rem 1.5rem",
                        borderBottom:"1px solid #BBF7D0",borderTop:"1px solid #BBF7D0"
                      }}>
                        {/* Result header */}
                        <div className="flex items-center gap-2.5 mb-3 flex-wrap">
                          <span className="text-xs font-semibold" style={{color:"#7C3AED"}}>
                            {res.technique_id}
                          </span>
                          <i className="fa-solid fa-arrow-right text-slate-400 text-[9px]"></i>
                          <span className="text-xs text-slate-500">{res.target}</span>
                          <span className={`badge badge-${res.status}`}>{res.status}</span>
                          {via === "shannon_ai" && <span className="badge" style={{background:"#EDE9FE",color:"#7C3AED",border:"1px solid #DDD6FE"}}>
                            <i className="fa-solid fa-wand-magic-sparkles mr-1 text-[9px]"></i>Shannon AI</span>}
                          {via === "agent" && <span className="badge" style={{background:"#DCFCE7",color:"#16a34a",border:"1px solid #BBF7D0"}}>
                            <i className="fa-solid fa-robot mr-1 text-[9px]"></i>Agent</span>}
                          {via === "registry" && <span className="badge" style={{background:"#F1F5F9",color:"#64748b",border:"1px solid #CBD5E1"}}>
                            <i className="fa-solid fa-code mr-1 text-[9px]"></i>Registry</span>}
                          {res.duration_seconds != null && (
                            <span className="text-xs text-slate-500">{res.duration_seconds?.toFixed(1)}s</span>
                          )}
                          {findings.length > 0 && (
                            <span className={`badge ml-auto ${detected ? "badge-high" : "badge-active"}`}>
                              {detected ? "⚠ Detected" : "✓ Gap — not detected"}
                            </span>
                          )}
                        </div>

                        {/* Output */}
                        {res.result_detail && (
                          <div className="sigma-block mb-3" style={{maxHeight:"320px",overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                            {res.result_detail}
                          </div>
                        )}

                        {/* Findings */}
                        {findings.length > 0 && (
                          <div className="grid gap-2 mb-3" style={{gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))"}}>
                            {findings.map((f,i) => (
                              <div key={i} className="p-3 rounded-lg text-xs"
                                style={{background:"#ffffff",border:`1px solid ${f.detected?"#FCA5A5":"#86EFAC"}`}}>
                                <div className="flex items-center gap-2 mb-1.5">
                                  <span className={`badge badge-${f.severity}`}>{f.severity}</span>
                                  <span style={{color: f.detected?"#dc2626":"#16a34a",fontWeight:600}}>
                                    {f.detected ? "Detected" : "Not detected"}
                                  </span>
                                  <span className="text-slate-500">{f.detection_quality}</span>
                                </div>
                                {f.gap_description && <p className="text-slate-500 leading-relaxed">{f.gap_description}</p>}
                                {f.sigma_rule && (
                                  <details className="mt-2">
                                    <summary className="cursor-pointer text-slate-500 hover:text-blue-600 transition-colors">
                                      <i className="fa-solid fa-shield-halved mr-1"></i>Sigma Rule
                                    </summary>
                                    <div className="sigma-block mt-1.5">{f.sigma_rule}</div>
                                  </details>
                                )}
                              </div>
                            ))}
                          </div>
                        )}

                        {/* Evasion / retry suggestions from Shannon */}
                        {(res.status === "failed" || detected) && !hasPlan && (
                          <div className="pt-2" style={{borderTop:"1px solid #BFDBFE"}}>
                            {evadeLoading[s.id] ? (
                              <span className="text-xs text-slate-500">
                                <i className="fa-solid fa-circle-notch spin mr-1.5"></i>
                                Shannon sedang menyusun alternatif…
                              </span>
                            ) : (
                              <button className="btn-sm" type="button"
                                style={{background:"#EDE9FE",color:"#7C3AED",border:"1px solid #DDD6FE",
                                        padding:"0.3rem 0.85rem",fontSize:"0.73rem",borderRadius:"0.4rem",fontWeight:600}}
                                onClick={()=>askEvadeAlternatives(s.id, res)}
                                onMouseEnter={e=>{e.currentTarget.style.background="#DDD6FE"}}
                                onMouseLeave={e=>{e.currentTarget.style.background="#EDE9FE"}}>
                                <i className="fa-solid fa-wand-magic-sparkles mr-1.5 text-[9px]"></i>
                                {res.status === "failed" ? "Ask Shannon — retry with alternative" : "Ask Shannon — evade detection"}
                              </button>
                            )}
                          </div>
                        )}
                      </td></tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Techniques ───────────────────────────────────────────────────────────────
function TechniqueDetail({ t, impl, implLoading }) {
  const hasImpl = impl !== null && impl !== undefined && impl !== false;
  const [aiExamples, setAiExamples] = useState(null);   // null=not fetched, false=error, obj=data
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");

  async function generateExamples() {
    setAiLoading(true); setAiError(""); setAiExamples(null);
    try {
      const data = await apiFetch(`/techniques/${t.id}/examples`, { method: "POST" });
      setAiExamples(data);
    } catch(e) {
      setAiError(e.message);
      setAiExamples(false);
    } finally {
      setAiLoading(false);
    }
  }

  return (
    <tr>
      <td colSpan={8} className="px-4 py-5 fade-in" style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0"}}>
        {/* Header row */}
        <div className="flex items-center gap-3 mb-4">
          <span className="font-mono font-bold text-sm" style={{color:"#7C3AED"}}>{t.id}</span>
          <span className="text-slate-900 font-semibold">{t.name}</span>
          {hasImpl && (
            <span className="badge badge-active">
              <i className="fa-solid fa-code mr-1"></i>Registry Impl
            </span>
          )}
          <div className="ml-auto flex items-center gap-2">
            {t.attack_url && (
              <a href={t.attack_url} target="_blank" rel="noreferrer" className="btn-sm btn-ghost">
                <i className="fa-solid fa-arrow-up-right-from-square"></i> ATT&CK Page
              </a>
            )}
            {aiExamples === null && !aiLoading && (
              <button className="btn-sm btn-purple" onClick={generateExamples}>
                <i className="fa-solid fa-wand-magic-sparkles"></i> Generate AI Examples
              </button>
            )}
            {aiLoading && (
              <span className="text-xs text-slate-400 flex items-center gap-2">
                <i className="fa-solid fa-circle-notch spin"></i> Shannon AI generating...
              </span>
            )}
            {(aiExamples !== null && aiExamples !== false) && (
              <button className="btn-sm btn-ghost" onClick={() => setAiExamples(null)}>
                <i className="fa-solid fa-rotate-right"></i> Regenerate
              </button>
            )}
          </div>
        </div>

        {/* Main grid: left = description + platforms, right = detection + mitigation + datasources */}
        <div className="grid gap-5" style={{gridTemplateColumns: hasImpl ? "1fr 1fr" : "1fr 1fr"}}>
          {/* LEFT */}
          <div className="space-y-4">
            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Description</div>
              <p className="text-sm text-slate-700 leading-relaxed">{t.description || "—"}</p>
            </div>

            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Platforms</div>
              {t.platforms?.length > 0
                ? <div className="flex flex-wrap gap-1">{t.platforms.map(p=><span key={p} className="tag-chip"><i className="fa-solid fa-display" style={{fontSize:"0.6rem"}}></i>{p}</span>)}</div>
                : <span className="text-slate-600 text-xs">—</span>}
            </div>

            {t.tactics?.length > 1 && (
              <div>
                <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">All Tactics</div>
                <div className="flex flex-wrap gap-1">{t.tactics.map(ta=><span key={ta} className="tag-chip">{ta.replace(/_/g," ")}</span>)}</div>
              </div>
            )}
          </div>

          {/* RIGHT */}
          <div className="space-y-4">
            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Detection Hints</div>
              {t.detection_note
                ? <p className="text-sm text-slate-700 leading-relaxed">{t.detection_note}</p>
                : <span className="text-slate-600 text-xs">Not available from ATT&CK STIX data for this technique.</span>}
            </div>

            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Mitigation</div>
              {t.mitigation_note
                ? <p className="text-sm text-slate-700 leading-relaxed">{t.mitigation_note}</p>
                : <span className="text-slate-600 text-xs">Not loaded — STIX mitigations require relationship traversal (see ATT&CK page).</span>}
            </div>

            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Data Sources</div>
              {t.data_sources?.length > 0
                ? <div className="flex flex-wrap gap-1">{t.data_sources.map(d=><span key={d} className="tag-chip">{d}</span>)}</div>
                : <span className="text-slate-600 text-xs">—</span>}
            </div>
          </div>
        </div>

        {/* Implementation section */}
        {implLoading && (
          <div className="mt-4 pt-4" style={{borderTop:"1px solid #E2E8F0"}}>
            <Spinner />
          </div>
        )}
        {hasImpl && !implLoading && (
          <div className="mt-4 pt-4" style={{borderTop:"1px solid #E2E8F0"}}>
            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">
              <i className="fa-solid fa-terminal mr-2" style={{color:"#4ade80"}}></i>
              Platform Implementation Details
            </div>
            <div className="grid gap-4" style={{gridTemplateColumns: Object.keys(impl.payload_templates||{}).length > 0 && Object.keys(impl.interpreters||{}).length > 0 ? "1fr 1fr" : "1fr"}}>
              {/* Payload Templates */}
              {Object.keys(impl.payload_templates||{}).length > 0 && (
                <div>
                  <div className="text-xs text-slate-500 uppercase tracking-wider mb-2">Payload Templates</div>
                  <div className="space-y-2">
                    {Object.entries(impl.payload_templates).map(([name, payload]) => (
                      <div key={name}>
                        <div className="text-xs text-slate-400 mb-1 font-mono">{name}</div>
                        <div className="sigma-block">{payload}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Interpreters */}
              {Object.keys(impl.interpreters||{}).length > 0 && (
                <div>
                  <div className="text-xs text-slate-500 uppercase tracking-wider mb-2">Supported Interpreters</div>
                  <div className="space-y-2">
                    {Object.entries(impl.interpreters).map(([interp, info]) => {
                      const risk = Math.round((info.detection_risk||0) * 100);
                      const riskColor = risk >= 40 ? "#f87171" : risk >= 25 ? "#fbbf24" : "#4ade80";
                      return (
                        <div key={interp} className="flex items-start gap-3 p-2 rounded" style={{background:"#F8FAFC",border:"1px solid #E2E8F0"}}>
                          <div className="flex-1">
                            <div className="text-xs font-mono font-semibold text-slate-900">{interp}</div>
                            <div className="text-xs text-slate-500 mt-0.5">{info.description}</div>
                          </div>
                          <div className="text-right shrink-0">
                            <div className="text-xs font-bold" style={{color:riskColor}}>{risk}% detection risk</div>
                            {info.edr_alert_prone && <div className="text-xs text-slate-600 mt-0.5">EDR alert prone</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Variants */}
              {(impl.variants||[]).length > 0 && (
                <div className={Object.keys(impl.payload_templates||{}).length > 0 ? "col-span-2" : ""}>
                  <div className="text-xs text-slate-500 uppercase tracking-wider mb-2">Variants / Sub-types</div>
                  <div className="flex flex-wrap gap-2">
                    {impl.variants.map((v,i) => (
                      <div key={i} className="flex flex-col p-2 rounded" style={{background:"#F8FAFC",border:"1px solid #E2E8F0",minWidth:"160px"}}>
                        <span className="text-xs font-semibold text-slate-900 font-mono">{v.name}</span>
                        {v.description && <span className="text-xs text-slate-500 mt-0.5">{v.description}</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="mt-3 p-2 rounded text-xs text-slate-500" style={{background:"#F8FAFC",border:"1px dashed #CBD5E1"}}>
              <i className="fa-solid fa-circle-info mr-1"></i>
              These payloads are used during campaign simulation. In C2 agent mode (real execution), the agent runs actual commands on target. In simulation mode, output is generated locally without touching the target.
            </div>
          </div>
        )}
        {!hasImpl && !implLoading && (
          <div className="mt-4 pt-4" style={{borderTop:"1px solid #E2E8F0"}}>
            <div className="text-xs text-slate-600 italic">
              <i className="fa-solid fa-circle-info mr-1"></i>
              No concrete implementation in registry — this technique is catalogued from MITRE ATT&CK STIX data only.
              Simulation uses generic behaviour. To add an implementation, create <span className="font-mono">core/techniques/it/{t.id.toLowerCase().replace('.','_')}.py</span>.
            </div>
          </div>
        )}

        {/* ── Shannon AI Generated Examples ── */}
        {aiError && (
          <div className="mt-4 pt-4" style={{borderTop:"1px solid #E2E8F0"}}>
            <div className="text-xs text-red-500"><i className="fa-solid fa-triangle-exclamation mr-1"></i>{aiError}</div>
          </div>
        )}
        {aiExamples && typeof aiExamples === "object" && (
          <div className="mt-4 pt-4 fade-in" style={{borderTop:"1px solid #DDD6FE"}}>
            <div className="flex items-center gap-2 mb-4">
              <div className="text-xs font-semibold uppercase tracking-wider" style={{color:"#7C3AED"}}>
                <i className="fa-solid fa-wand-magic-sparkles mr-2"></i>Shannon AI — Payload Examples
              </div>
              <span className="badge" style={{background:"#EDE9FE",color:"#7C3AED",fontSize:"0.65rem"}}>
                For authorized red team use only
              </span>
            </div>

            {/* Summary */}
            {aiExamples.summary && (
              <p className="text-sm text-slate-600 mb-4 leading-relaxed">{aiExamples.summary}</p>
            )}

            {/* Examples per platform */}
            {(aiExamples.examples || []).length > 0 && (
              <div className="space-y-3 mb-4">
                {aiExamples.examples.map((ex, i) => (
                  <div key={i} className="rounded-lg overflow-hidden" style={{border:"1px solid #DDD6FE"}}>
                    <div className="flex items-center gap-2 px-3 py-2" style={{background:"#EDE9FE"}}>
                      <span className="text-xs font-bold" style={{color:"#7C3AED"}}>
                        <i className={`fa-solid ${ex.platform?.toLowerCase().includes("win") ? "fa-brands fa-windows" : ex.platform?.toLowerCase().includes("linux") ? "fa-brands fa-linux" : "fa-terminal"} mr-1`}></i>
                        {ex.platform}
                      </span>
                      {ex.tool && (
                        <span className="text-xs text-slate-500">via {ex.tool}</span>
                      )}
                    </div>
                    <div className="px-3 py-3" style={{background:"#F5F3FF"}}>
                      {(ex.commands || []).map((cmd, j) => (
                        <div key={j} className="sigma-block mb-2 last:mb-0">{cmd}</div>
                      ))}
                      {ex.notes && (
                        <div className="mt-2 text-xs text-slate-500 flex items-start gap-1">
                          <i className="fa-solid fa-shield-halved mt-0.5 shrink-0" style={{color:"#fbbf24"}}></i>
                          <span>{ex.notes}</span>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Detection & OPSEC */}
            <div className="grid grid-cols-2 gap-4">
              {aiExamples.detection_tips && (
                <div className="p-3 rounded" style={{background:"#EFF6FF",border:"1px solid #BFDBFE"}}>
                  <div className="text-xs font-semibold mb-1" style={{color:"#2563eb"}}>
                    <i className="fa-solid fa-eye mr-1"></i>Detection Tips
                  </div>
                  <p className="text-xs text-slate-600 leading-relaxed">{aiExamples.detection_tips}</p>
                </div>
              )}
              {aiExamples.opsec_considerations && (
                <div className="p-3 rounded" style={{background:"#FFFBEB",border:"1px solid #FDE68A"}}>
                  <div className="text-xs font-semibold mb-1" style={{color:"#d97706"}}>
                    <i className="fa-solid fa-user-ninja mr-1"></i>OPSEC Considerations
                  </div>
                  <p className="text-xs text-slate-600 leading-relaxed">{aiExamples.opsec_considerations}</p>
                </div>
              )}
            </div>

            {/* References */}
            {(aiExamples.references || []).length > 0 && (
              <div className="mt-3 flex flex-wrap gap-1">
                {aiExamples.references.map((r, i) => (
                  <span key={i} className="tag-chip">{r}</span>
                ))}
              </div>
            )}
          </div>
        )}
      </td>
    </tr>
  );
}

function Techniques() {

  const [envFilter, setEnvFilter] = useState("");

  const [implData, setImplData] = useState({});       // tid → impl or false
  const [implLoading, setImplLoading] = useState(null); // tid currently loading
  const [err, setErr] = useState("");

  const load = useCallback(() => {
    const p = new URLSearchParams();
    if (search) p.set("search", search);
    if (envFilter) p.set("environment", envFilter);
    if (tacticFilter) p.set("tactic", tacticFilter);
    p.set("limit","200");
    apiFetch(`/techniques/?${p}`).then(setTechniques).catch(e => { setErr(e.message); setTechniques([]); });
    apiFetch("/techniques/registry/info").then(setRegInfo).catch(() => {});
  }, [search, envFilter, tacticFilter]);
  useEffect(() => { load(); }, [load]);

  function toggleRow(t) {
    if (selected?.id === t.id) {
      setSelected(null);
      return;
    }
    setSelected(t);
    // Only fetch impl if this technique is known to have a registry implementation.
    // regInfo.technique_ids lists all IDs with concrete implementations — skip the
    // network call (and the 404) for techniques that are STIX-only.
    if (!(t.id in implData)) {
      const hasRegistryImpl = regInfo?.technique_ids?.includes(t.id);
      if (hasRegistryImpl) {
        setImplLoading(t.id);
        apiFetch(`/techniques/${t.id}/impl`)
          .then(data => { setImplData(d => ({...d, [t.id]: data})); })
          .catch(() => { setImplData(d => ({...d, [t.id]: false})); })
          .finally(() => setImplLoading(null));
      } else {
        // Mark immediately as no-impl so we don't re-check on next click
        setImplData(d => ({...d, [t.id]: false}));
      }
    }
  }

  const dbEmpty = techniques !== null && techniques.length === 0 && !search && !envFilter && !tacticFilter;

  return (
    <div className="space-y-5">
      <div>
        <h1 className="text-xl font-bold text-slate-900">Technique Library</h1>
        <p className="text-sm text-slate-500 mt-1">MITRE ATT&CK Enterprise + ICS/OT — click a row to see details & implementation</p>
      </div>
      <Alert msg={err} onClose={() => setErr("")} />

      {regInfo && (
        <div className="grid grid-cols-4 gap-3">
          <StatCard icon="fa-book-open"  color="purple" title="Registry Total"     value={regInfo.total}         sub="Techniques with implementation" />
          <StatCard icon="fa-laptop"     color="blue"   title="IT Techniques"      value={regInfo.it_techniques} sub="Enterprise ATT&CK" />
          <StatCard icon="fa-industry"   color="amber"  title="OT/ICS Techniques"  value={regInfo.ot_techniques} sub="ATT&CK for ICS" />
          <StatCard icon="fa-database"   color="emerald" title="DB Techniques"     value={techniques?.length ?? "—"} sub="Loaded from MITRE" />
        </div>
      )}

      {dbEmpty && (
        <div className="card p-6" style={{border:"1px solid #BFDBFE"}}>
          <div className="flex items-start gap-4">
            <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style={{background:"#DBEAFE"}}>
              <i className="fa-solid fa-database" style={{color:"#2563eb"}}></i>
            </div>
            <div className="flex-1">
              <h3 className="font-semibold text-slate-900 mb-1">Technique Database Empty</h3>
              <p className="text-sm text-slate-500 mb-3">Run this command to download MITRE ATT&CK Enterprise + ICS:</p>
              <div className="sigma-block">python -m core.main sync-attack</div>
              <p className="text-xs text-slate-500 mt-2">After syncing, reload this page to see all techniques.</p>
            </div>
          </div>
        </div>
      )}

      {!dbEmpty && (
        <div className="card p-4 flex gap-3">
          <input className="input-field" placeholder="Search by ID or name — e.g. T1566, Phishing"
            value={search} onChange={e => setSearch(e.target.value)} />
          <select className="input-field" style={{width:"160px"}} value={envFilter} onChange={e => setEnvFilter(e.target.value)}>
            <option value="">All Environments</option><option value="it">IT</option><option value="ot">OT/ICS</option>
          </select>
          <select className="input-field" style={{width:"200px"}} value={tacticFilter} onChange={e => setTacticFilter(e.target.value)}>
            <option value="">All Tactics</option>
            {["initial_access","execution","persistence","privilege_escalation","defense_evasion","credential_access",
              "discovery","lateral_movement","collection","exfiltration","impact","command_and_control",
              "inhibit_response_function","impair_process_control"].map(t=>(
              <option key={t} value={t}>{t.replace(/_/g," ")}</option>
            ))}
          </select>
        </div>
      )}

      {techniques === null ? <Spinner /> : !dbEmpty && techniques.length === 0 ? (
        <div className="card p-12 text-center text-slate-600"><i className="fa-solid fa-magnifying-glass text-3xl mb-3 block"></i>No techniques match the current filters</div>
      ) : !dbEmpty && (
        <div className="card overflow-hidden">
          <div className="px-4 py-3 text-xs text-slate-500" style={{borderBottom:"1px solid #E2E8F0",background:"#F8FAFC"}}>
            {techniques.length} technique{techniques.length!==1?"s":""} — click a row for details & payload examples
          </div>
          <table className="w-full text-sm">
            <thead><tr style={{background:"#F8FAFC", borderBottom:"1px solid #E2E8F0"}}>
              {["ID","Name","Tactic","Env","Risk","Impl","Sub-technique",""].map(h=>(
                <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">{h}</th>
              ))}
            </tr></thead>
            <tbody className="divide-y" style={{borderColor:"#E2E8F0"}}>
              {techniques.map(t => {

}

  const load = useCallback(() => {
    apiFetch("/apt-profiles/").then(setProfiles).catch(e => { setErr(e.message); setProfiles([]); });

  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }

function AgentTaskPanel({ agent, onClose }) {
  const [tasks, setTasks] = useState(null);
  const [err, setErr] = useState("");
  const [success, setSuccess] = useState("");
  const [showQueue, setShowQueue] = useState(false);
  const [selectedTask, setSelectedTask] = useState(null);
  const [qForm, setQForm] = useState({ task_type:"execute_technique", technique_id:"", priority:5, timeout_seconds:300, task_params:{} });
  const [rawParams, setRawParams] = useState("{}");
  const [showConfirm, ConfirmNode] = useConfirm();

  const TASK_TYPES = [
    "execute_technique","shell_command","powershell","python_exec",
    "file_read","file_write","process_enum","network_scan",
  ];

  const load = useCallback(() => {
    apiFetch(`/agents/${agent.id}/tasks`).then(setTasks).catch(e => { setErr(e.message); setTasks([]); });
  }, [agent.id]);
  useEffect(() => { load(); }, [load]);

  async function queueTask(e) {
    e.preventDefault(); setErr("");
    try {
      let params = {};
      try { params = JSON.parse(rawParams); } catch { params = {}; }
      const body = { ...qForm, task_params: params };
      if (!body.technique_id) delete body.technique_id;
      await apiFetch(`/agents/${agent.id}/tasks`, { method:"POST", body:JSON.stringify(body) });
      setSuccess("Task queued — agent will pick it up on next beacon");
      setShowQueue(false);
      load();
    } catch(ex) { setErr(ex.message); }
  }

  async function terminateAgent() {
    const ok = await showConfirm({
      title: "Terminate Agent",
      message: `Agent "${agent.hostname}" akan dihentikan dan tidak akan menerima task baru.\nSemua pending tasks akan dibatalkan.`,
      confirmLabel: "Ya, Terminate",
      variant: "danger",
      icon: "fa-skull",
    });
    if (!ok) return;
    try {
      await apiFetch(`/agents/${agent.id}?reason=manual+terminate`, { method:"DELETE" });
      setSuccess("Agent terminated");
      onClose();
    } catch(ex) { setErr(ex.message); }
  }

  const statusDot = { pending:"#fbbf24", queued:"#fbbf24", running:"#60a5fa", completed:"#34d399", failed:"#f87171", cancelled:"#64748b" };

  return ReactDOM.createPortal(
    <>
    {ConfirmNode}
    <div className="fixed inset-0 z-[150] flex" style={{background:"rgba(15,30,60,0.5)"}} onClick={e => e.target===e.currentTarget && onClose()}>
